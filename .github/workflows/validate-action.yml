name: Validate VBBI Action

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image repository owner
        id: imagevars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push smoke image
        id: smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.imagevars.outputs.owner_lc }}/vbbi-action-smoke:${{ github.sha }}
          file: ./Dockerfile.smoke

      - name: Prepare VBBI metadata files
        run: |
          mkdir -p /tmp/vbbi
          cat > /tmp/vbbi/lint-results.json <<'EOF'
          {"exit_code":0,"linter":"smoke","violation_count":0}
          EOF
          cat > /tmp/vbbi/test-results.json <<'EOF'
          {"exit_code":0,"tests_passed":1,"tests_failed":0}
          EOF
          cat > /tmp/vbbi/build-results.json <<EOF
          {"exit_code":0,"image":"ghcr.io/${{ steps.imagevars.outputs.owner_lc }}/vbbi-action-smoke@${{ steps.smoke.outputs.digest }}"}
          EOF
          cat > /tmp/vbbi/scan-results.json <<'EOF'
          {"exit_code":0,"scanner":"trivy","critical":0,"high":0}
          EOF
          cat > /tmp/vbbi/step-spec.json <<'EOF'
          [
            {"name": "linting", "file": "/tmp/vbbi/lint-results.json"},
            {"name": "unit-tests", "file": "/tmp/vbbi/test-results.json"},
            {"name": "image-build", "file": "/tmp/vbbi/build-results.json"},
            {"name": "vulnerability-scan", "file": "/tmp/vbbi/scan-results.json"}
          ]
          EOF

      - name: Run local VBBI action
        id: vbbi
        uses: ./
        with:
          image: ghcr.io/${{ steps.imagevars.outputs.owner_lc }}/vbbi-action-smoke@${{ steps.smoke.outputs.digest }}
          commit-sha: ${{ github.sha }}
          step-spec-path: /tmp/vbbi/step-spec.json
          hmac-key: smoke-test-key
          slsa-level: "3"

      - name: Verify smoke attestation
        run: |
          IMAGE_REF="ghcr.io/${{ steps.imagevars.outputs.owner_lc }}/vbbi-action-smoke@${{ steps.smoke.outputs.digest }}"
          IDENTITY="https://github.com/${{ github.repository }}/.github/workflows/validate-action.yml@refs/heads/${{ github.head_ref || github.ref_name }}"
          cosign verify-attestation \
            "$IMAGE_REF" \
            --type https://devsecops.licenta.ro/VBBI/v1 \
            --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            >/tmp/vbbi-action-attestation.jsonl
          ROOT=$(jq -r '.payload' /tmp/vbbi-action-attestation.jsonl | head -n1 | base64 -d | jq -r '.predicate.merkle_tree.root_hash')
          PROVIDER=$(jq -r '.payload' /tmp/vbbi-action-attestation.jsonl | head -n1 | base64 -d | jq -r '.predicate.hmac_chain.provider')
          STEP_COUNT=$(jq -r '.payload' /tmp/vbbi-action-attestation.jsonl | head -n1 | base64 -d | jq -r '.predicate.hmac_chain.steps | length')
          test -n "$ROOT"
          test "$PROVIDER" = "shared-secret"
          test "$STEP_COUNT" = "4"
          test "$ROOT" = "${{ steps.vbbi.outputs.merkle-root }}"
